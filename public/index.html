<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoVault - Vehicle Inventory Management System</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 950: '#020617' }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel Compiler for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Axios & Lucide Icons -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #020617;
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-image: 
        radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
        radial-gradient(at 50% 100%, rgba(168, 85, 247, 0.08) 0px, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .glass-input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .glass-input:focus {
      border-color: rgba(56, 189, 248, 0.6);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE_URL = 'http://127.0.0.1:8000/api';

    const api = axios.create({
      baseURL: API_BASE_URL,
      headers: { 'Content-Type': 'application/json' }
    });

    api.interceptors.request.use(config => {
      const token = localStorage.getItem('access_token');
      if (token) config.headers.Authorization = `Bearer ${token}`;
      return config;
    });

    function App() {
      const [user, setUser] = React.useState(() => {
        const saved = localStorage.getItem('user');
        return saved ? JSON.parse(saved) : null;
      });
      const [vehicles, setVehicles] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [toast, setToast] = React.useState(null);
      
      const [isAuthOpen, setIsAuthOpen] = React.useState(false);
      const [isVehicleModalOpen, setIsVehicleModalOpen] = React.useState(false);
      const [vehicleToEdit, setVehicleToEdit] = React.useState(null);
      const [isRestockOpen, setIsRestockOpen] = React.useState(false);
      const [selectedRestockVehicle, setSelectedRestockVehicle] = React.useState(null);

      const [filters, setFilters] = React.useState({
        make: '', model: '', category: '', min_price: '', max_price: ''
      });

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const fetchVehicles = React.useCallback(async () => {
        setLoading(true);
        try {
          const hasFilters = Object.values(filters).some(val => val !== '');
          let data = [];
          if (hasFilters) {
            const queryParams = new URLSearchParams();
            if (filters.make) queryParams.append('make', filters.make);
            if (filters.model) queryParams.append('model', filters.model);
            if (filters.category) queryParams.append('category', filters.category);
            if (filters.min_price) queryParams.append('min_price', filters.min_price);
            if (filters.max_price) queryParams.append('max_price', filters.max_price);
            const res = await api.get(`/vehicles/search?${queryParams.toString()}`);
            data = res.data;
          } else {
            const res = await api.get('/vehicles?skip=0&limit=100');
            data = res.data;
          }
          setVehicles(data);
        } catch (err) {
          showToast('Backend API not responding at http://127.0.0.1:8000/api. Make sure FastAPI server is running.', 'error');
        } finally {
          setLoading(false);
        }
      }, [filters]);

      React.useEffect(() => {
        fetchVehicles();
      }, [fetchVehicles]);

      const handleLogout = () => {
        localStorage.removeItem('access_token');
        localStorage.removeItem('user');
        setUser(null);
        showToast('Logged out successfully', 'info');
      };

      const handlePurchase = async (vehicle) => {
        if (!user) {
          setIsAuthOpen(true);
          return;
        }
        try {
          const res = await api.post(`/vehicles/${vehicle.id}/purchase`, { quantity: 1 });
          showToast(res.data.message, 'success');
          fetchVehicles();
        } catch (err) {
          showToast(err.response?.data?.detail || 'Purchase failed', 'error');
        }
      };

      const handleDelete = async (vehicleId) => {
        if (!confirm('Are you sure you want to delete this vehicle?')) return;
        try {
          await api.delete(`/vehicles/${vehicleId}`);
          showToast('Vehicle deleted successfully', 'success');
          fetchVehicles();
        } catch (err) {
          showToast(err.response?.data?.detail || 'Delete failed', 'error');
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="sticky top-0 z-40 glass-panel border-b border-slate-800">
            <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-indigo-600 flex items-center justify-center font-black text-xl shadow-lg">🏎️</div>
                <div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">AutoVault</h1>
                  <p className="text-xs text-cyan-400 font-semibold">Vehicle Inventory System</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                {user ? (
                  <>
                    {user.role === 'admin' && (
                      <button
                        onClick={() => { setVehicleToEdit(null); setIsVehicleModalOpen(true); }}
                        className="px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-bold text-xs shadow-lg hover:brightness-110"
                      >
                        + Add Vehicle
                      </button>
                    )}
                    <div className="px-3 py-1.5 glass-card rounded-xl border border-slate-700 flex items-center gap-2">
                      <span className="text-xs font-bold text-slate-200">{user.username}</span>
                      <span className={`text-[10px] uppercase font-bold px-2 py-0.5 rounded-full ${user.role === 'admin' ? 'bg-amber-500/20 text-amber-300' : 'bg-cyan-500/20 text-cyan-300'}`}>
                        {user.role}
                      </span>
                    </div>
                    <button onClick={handleLogout} className="p-2 text-slate-400 hover:text-rose-400">Logout</button>
                  </>
                ) : (
                  <button
                    onClick={() => setIsAuthOpen(true)}
                    className="px-5 py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-bold text-sm shadow-lg hover:brightness-110"
                  >
                    Login / Register
                  </button>
                )}
              </div>
            </div>
          </header>

          {/* Main Dashboard */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
            <div className="glass-panel rounded-3xl p-8 mb-8 border border-slate-800 shadow-2xl">
              <span className="px-3 py-1 rounded-full text-xs font-bold bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">FastAPI + React + Tailwind</span>
              <h2 className="text-3xl font-extrabold text-white mt-2">Vehicle Inventory Dashboard</h2>
              <p className="text-slate-400 text-sm mt-1">Browse available cars, search by price range, or log in to purchase and manage inventory.</p>
            </div>

            {/* Filter */}
            <div className="glass-panel rounded-2xl p-4 mb-8 border border-slate-800 grid grid-cols-1 sm:grid-cols-5 gap-3">
              <input
                type="text"
                placeholder="Make (e.g. Toyota)"
                value={filters.make}
                onChange={e => setFilters({...filters, make: e.target.value})}
                className="glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none"
              />
              <input
                type="text"
                placeholder="Model (e.g. Camry)"
                value={filters.model}
                onChange={e => setFilters({...filters, model: e.target.value})}
                className="glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none"
              />
              <input
                type="text"
                placeholder="Category (e.g. Sedan)"
                value={filters.category}
                onChange={e => setFilters({...filters, category: e.target.value})}
                className="glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none"
              />
              <input
                type="number"
                placeholder="Min Price ($)"
                value={filters.min_price}
                onChange={e => setFilters({...filters, min_price: e.target.value})}
                className="glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none"
              />
              <input
                type="number"
                placeholder="Max Price ($)"
                value={filters.max_price}
                onChange={e => setFilters({...filters, max_price: e.target.value})}
                className="glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none"
              />
            </div>

            {/* Vehicles Grid */}
            {loading ? (
              <div className="text-center py-12 text-slate-400 text-sm">Loading vehicles from backend API...</div>
            ) : vehicles.length === 0 ? (
              <div className="text-center py-12 glass-panel rounded-3xl border border-slate-800 text-slate-400">No vehicles found matching criteria.</div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {vehicles.map(v => {
                  const outOfStock = v.quantity === 0;
                  return (
                    <div key={v.id} className="glass-card rounded-3xl p-6 border border-slate-800 flex flex-col justify-between hover:border-cyan-500/40 transition-all">
                      <div>
                        <div className="flex justify-between items-center mb-3">
                          <span className="px-3 py-1 rounded-full text-xs font-semibold bg-cyan-950 text-cyan-300 border border-cyan-500/30">{v.category}</span>
                          {outOfStock ? (
                            <span className="px-3 py-1 rounded-full text-xs font-bold bg-rose-950 text-rose-400 border border-rose-500/30">OUT OF STOCK</span>
                          ) : (
                            <span className="px-3 py-1 rounded-full text-xs font-medium bg-emerald-950 text-emerald-400 border border-emerald-500/30">{v.quantity} In Stock</span>
                          )}
                        </div>
                        <h3 className="text-xl font-bold text-white">{v.make} {v.model}</h3>
                        <p className="text-xs text-slate-400">ID: #{v.id}</p>
                        <div className="my-4">
                          <span className="text-2xl font-black text-emerald-400">${v.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</span>
                        </div>
                      </div>

                      <div className="space-y-2 pt-4 border-t border-slate-800">
                        <button
                          onClick={() => handlePurchase(v)}
                          disabled={outOfStock || !user}
                          className={`w-full py-2.5 rounded-xl font-bold text-xs transition-all ${
                            outOfStock
                              ? 'bg-slate-800 text-slate-500 cursor-not-allowed'
                              : !user
                              ? 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                              : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg'
                          }`}
                        >
                          {outOfStock ? 'Out of Stock' : !user ? 'Log in to Purchase' : 'Purchase Vehicle'}
                        </button>

                        {user?.role === 'admin' && (
                          <div className="flex gap-2 pt-2">
                            <button
                              onClick={() => { setVehicleToEdit(v); setIsVehicleModalOpen(true); }}
                              className="flex-1 py-1.5 bg-slate-800 text-cyan-300 rounded-lg text-xs font-bold hover:bg-cyan-950"
                            >
                              Edit
                            </button>
                            <button
                              onClick={() => { setSelectedRestockVehicle(v); setIsRestockOpen(true); }}
                              className="flex-1 py-1.5 bg-slate-800 text-amber-300 rounded-lg text-xs font-bold hover:bg-amber-950"
                            >
                              Restock
                            </button>
                            <button
                              onClick={() => handleDelete(v.id)}
                              className="flex-1 py-1.5 bg-slate-800 text-rose-400 rounded-lg text-xs font-bold hover:bg-rose-950"
                            >
                              Delete
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>

          {/* Auth Modal */}
          {isAuthOpen && (
            <AuthModal
              onClose={() => setIsAuthOpen(false)}
              onSuccess={(u) => { setUser(u); setIsAuthOpen(false); showToast('Logged in!', 'success'); }}
              showToast={showToast}
            />
          )}

          {/* Vehicle Form Modal */}
          {isVehicleModalOpen && (
            <VehicleFormModal
              vehicle={vehicleToEdit}
              onClose={() => setIsVehicleModalOpen(false)}
              onSuccess={() => { fetchVehicles(); setIsVehicleModalOpen(false); }}
              showToast={showToast}
            />
          )}

          {/* Restock Modal */}
          {isRestockOpen && (
            <RestockFormModal
              vehicle={selectedRestockVehicle}
              onClose={() => setIsRestockOpen(false)}
              onSuccess={() => { fetchVehicles(); setIsRestockOpen(false); }}
              showToast={showToast}
            />
          )}

          {/* Toast */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-50 bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-xl shadow-2xl text-sm font-semibold">
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    function AuthModal({ onClose, onSuccess, showToast }) {
      const [isLogin, setIsLogin] = React.useState(true);
      const [form, setForm] = React.useState({ username: '', email: '', password: '', role: 'user' });

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          if (isLogin) {
            const res = await api.post('/auth/login', { username_or_email: form.username || form.email, password: form.password });
            localStorage.setItem('access_token', res.data.access_token);
            localStorage.setItem('user', JSON.stringify(res.data.user));
            onSuccess(res.data.user);
          } else {
            await api.post('/auth/register', form);
            showToast('Registered! Please sign in.', 'success');
            setIsLogin(true);
          }
        } catch (err) {
          showToast(err.response?.data?.detail || 'Auth failed', 'error');
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4">
          <div className="w-full max-w-md glass-panel rounded-3xl p-6 border border-slate-800">
            <div className="flex gap-2 mb-6">
              <button onClick={() => setIsLogin(true)} className={`flex-1 py-2 rounded-xl font-bold text-xs ${isLogin ? 'bg-cyan-500 text-white' : 'text-slate-400'}`}>Login</button>
              <button onClick={() => setIsLogin(false)} className={`flex-1 py-2 rounded-xl font-bold text-xs ${!isLogin ? 'bg-cyan-500 text-white' : 'text-slate-400'}`}>Register</button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-3">
              <input type="text" placeholder="Username or Email" required value={form.username} onChange={e => setForm({...form, username: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none" />
              {!isLogin && (
                <input type="email" placeholder="Email" required value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none" />
              )}
              <input type="password" placeholder="Password" required value={form.password} onChange={e => setForm({...form, password: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none" />
              {!isLogin && (
                <select value={form.role} onChange={e => setForm({...form, role: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2.5 text-sm text-white bg-slate-900 focus:outline-none">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
              )}
              <button type="submit" className="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 font-bold text-sm text-white">{isLogin ? 'Sign In' : 'Create Account'}</button>
            </form>
            <button onClick={onClose} className="mt-4 text-xs text-slate-400 hover:text-white block mx-auto">Cancel</button>
          </div>
        </div>
      );
    }

    function VehicleFormModal({ vehicle, onClose, onSuccess, showToast }) {
      const [form, setForm] = React.useState({
        make: vehicle?.make || '',
        model: vehicle?.model || '',
        category: vehicle?.category || 'Sedan',
        price: vehicle?.price || '',
        quantity: vehicle?.quantity || ''
      });

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const payload = { ...form, price: parseFloat(form.price), quantity: parseInt(form.quantity) };
          if (vehicle) {
            await api.put(`/vehicles/${vehicle.id}`, payload);
            showToast('Vehicle updated!', 'success');
          } else {
            await api.post('/vehicles', payload);
            showToast('Vehicle added!', 'success');
          }
          onSuccess();
        } catch (err) {
          showToast(err.response?.data?.detail || 'Save failed', 'error');
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4">
          <div className="w-full max-w-md glass-panel rounded-3xl p-6 border border-slate-800">
            <h3 className="text-xl font-bold text-white mb-4">{vehicle ? 'Edit Vehicle' : 'Add Vehicle'}</h3>
            <form onSubmit={handleSubmit} className="space-y-3">
              <input type="text" placeholder="Make (e.g. Toyota)" required value={form.make} onChange={e => setForm({...form, make: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none" />
              <input type="text" placeholder="Model (e.g. Camry)" required value={form.model} onChange={e => setForm({...form, model: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none" />
              <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white bg-slate-900 focus:outline-none">
                <option value="Sedan">Sedan</option>
                <option value="SUV">SUV</option>
                <option value="Truck">Truck</option>
                <option value="Coupe">Coupe</option>
                <option value="Convertible">Convertible</option>
              </select>
              <input type="number" step="0.01" placeholder="Price ($)" required value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none" />
              <input type="number" placeholder="Quantity" required value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white focus:outline-none" />
              <button type="submit" className="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 font-bold text-sm text-white">Save Vehicle</button>
            </form>
            <button onClick={onClose} className="mt-4 text-xs text-slate-400 hover:text-white block mx-auto">Cancel</button>
          </div>
        </div>
      );
    }

    function RestockFormModal({ vehicle, onClose, onSuccess, showToast }) {
      const [qty, setQty] = React.useState(1);

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          await api.post(`/vehicles/${vehicle.id}/restock`, { quantity: parseInt(qty) });
          showToast(`Restocked +${qty} units!`, 'success');
          onSuccess();
        } catch (err) {
          showToast(err.response?.data?.detail || 'Restock failed', 'error');
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4">
          <div className="w-full max-w-sm glass-panel rounded-3xl p-6 border border-slate-800 text-center">
            <h3 className="text-xl font-bold text-white mb-2">Restock {vehicle?.make} {vehicle?.model}</h3>
            <p className="text-xs text-slate-400 mb-4">Current Stock: {vehicle?.quantity}</p>
            <form onSubmit={handleSubmit} className="space-y-4">
              <input type="number" min="1" required value={qty} onChange={e => setQty(e.target.value)} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-white text-center focus:outline-none" />
              <button type="submit" className="w-full py-3 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-bold text-sm text-white">Add Stock</button>
            </form>
            <button onClick={onClose} className="mt-4 text-xs text-slate-400 hover:text-white block mx-auto">Cancel</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
